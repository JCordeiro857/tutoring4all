<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Tutoring4All</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .blog-layout { display:grid; grid-template-columns:1fr 320px; gap:48px; align-items:start; }
    .blog-post h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,3vw,2.4rem); font-weight:800; color:var(--navy); line-height:1.2; margin-bottom:16px; }
    .blog-meta { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:32px; padding-bottom:24px; border-bottom:1px solid var(--gray-200); }
    .blog-meta-date { font-size:.82rem; color:var(--gray-400); }
    .blog-meta-tags { display:flex; gap:8px; flex-wrap:wrap; }
    .blog-meta-tags .tag { padding:4px 12px; background:var(--gray-100); border-radius:100px; font-size:.75rem; font-weight:600; color:var(--gray-600); }
    .blog-post .prose p { margin-bottom:18px; }
    .blog-post .prose h2 { margin-top:36px; }
    .sidebar-card { background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
    .sidebar-card h3 { font-size:.9rem; font-weight:700; color:var(--navy); margin-bottom:14px; }
    .recent-post { display:flex; gap:12px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--gray-100); }
    .recent-post:last-child { border-bottom:none; padding-bottom:0; }
    .rp-dot { width:8px; height:8px; border-radius:50%; background:var(--teal); flex-shrink:0; margin-top:6px; }
    .recent-post a { font-size:.83rem; font-weight:500; color:var(--navy); text-decoration:none; line-height:1.4; }
    .recent-post a:hover { color:var(--blue-mid); }
    .recent-post .rp-date { font-size:.73rem; color:var(--gray-400); margin-top:2px; }
    @media(max-width:1024px){ .blog-layout{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<script src="shared.js"></script>

<div class="page-hero">
  <div class="page-hero-inner">
    <p class="breadcrumb"><a href="index.html">Home</a> › <a href="blog.html">Blog</a> › Post</p>
  </div>
</div>

<section style="background:var(--gray-50);">
  <div class="section-inner">
    <div class="blog-layout">
      <article class="blog-post">
        <div class="blog-meta">
          <span class="blog-meta-date">📅</span>
          <div class="blog-meta-tags"></div>
        </div>
        <h1></h1>
        <div class="prose"></div>
        <div style="margin-top:40px;padding-top:32px;border-top:1px solid var(--gray-200);display:flex;gap:14px;flex-wrap:wrap;">
          <a href="contact.html" class="btn btn-blue">Enquire Now →</a>
          <a href="blog.html" class="btn btn-outline-dark">← Back to Blog</a>
        </div>
      </article>
      <aside>
        <div class="sidebar-card">
          <h3>Ready to Get Started?</h3>
          <p style="font-size:.86rem;color:var(--gray-600);line-height:1.6;margin-bottom:16px;">Contact us today for a no-obligation consultation.</p>
          <a href="contact.html" class="btn btn-blue" style="width:100%;justify-content:center;">Enquire Now →</a>
          <a href="tel:0490423713" class="btn btn-outline-dark" style="width:100%;justify-content:center;margin-top:10px;">📞 0490 423 713</a>
        </div>
        <div class="sidebar-card">
          <h3>Recent Posts</h3>
          <div class="recent-posts-list"></div>
        </div>
      </aside>
    </div>
  </div>
</section>

<script src="nav.js"></script>
<script src="content-render.js"></script>
</body>
</html>
