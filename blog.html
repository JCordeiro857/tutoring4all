<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Tutoring4All Sydney</title>
  <meta name="description" content="Tips, advice, and insights for students and parents from the Tutoring4All team — helping Sydney families navigate school life." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .blog-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; }
    .blog-card {
      background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg);
      overflow:hidden; transition:all .3s; display:flex; flex-direction:column;
    }
    .blog-card:hover { transform:translateY(-6px); box-shadow:var(--shadow-xl); border-color:transparent; }
    .blog-thumb {
      height:180px; display:flex; align-items:center; justify-content:center;
      font-size:3rem; position:relative;
    }
    .blog-body { padding:24px; flex:1; display:flex; flex-direction:column; }
    .blog-date { font-size:.75rem; font-weight:600; color:var(--gray-400); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
    .blog-card h2 { font-size:1.05rem; font-weight:700; color:var(--navy); line-height:1.35; margin-bottom:10px; }
    .blog-card p { font-size:.86rem; color:var(--gray-600); line-height:1.65; margin-bottom:18px; flex:1; }
    .blog-card a.read { font-size:.85rem; font-weight:700; color:var(--blue-mid); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .blog-card a.read:hover { color:var(--navy); }
    .blog-tag { display:inline-block; padding:3px 10px; background:var(--gray-100); border-radius:100px; font-size:.72rem; font-weight:600; color:var(--gray-600); margin-bottom:10px; }

    @media(max-width:1024px){ .blog-grid{grid-template-columns:1fr 1fr;} }
    @media(max-width:640px){ .blog-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<script src="shared.js"></script>

<div class="page-hero">
  <div class="page-hero-inner">
    <p class="breadcrumb"><a href="index.html">Home</a> › Blog</p>
    <h1>Our Blog</h1>
    <p>Tips, advice, and insights for students and parents from the Tutoring4All team.</p>
  </div>
</div>

<section style="background:var(--gray-50);">
  <div class="section-inner">
    <div class="blog-grid"><!-- populated by content-render.js from content/blog-posts.json --></div>
  </div>
</section>

<script src="nav.js"></script>
<script src="content-render.js"></script>
</body>
</html>
